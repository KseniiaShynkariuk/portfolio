<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Tarefas</title>

<style>
:root {
  --cor-principal: #ff69b4;
  --cor-fundo: #f5f5f5;
  --cor-card: #ffffff;
  --cor-texto: #333;
}

body.dark {
  --cor-fundo: #1e1e1e;
  --cor-card: #2c2c2c;
  --cor-texto: #eee;
}

body {
  font-family: Arial, sans-serif;
  background: var(--cor-fundo);
  color: var(--cor-texto);
  display: flex;
  justify-content: center;
  margin-top: 40px;
  transition: 0.3s;
}

.container {
  background: var(--cor-card);
  padding: 20px;
  border-radius: 15px;
  width: 350px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

input, button {
  padding: 8px;
  border-radius: 8px;
  border: none;
}

input {
  width: 65%;
  border: 1px solid #ccc;
}

button {
  background: var(--cor-principal);
  color: white;
  cursor: pointer;
}

ul {
  padding: 0;
  margin-top: 15px;
}

li {
  list-style: none;
  background: #eee;
  margin-top: 8px;
  padding: 8px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

body.dark li {
  background: #444;
}

.concluida {
  text-decoration: line-through;
  opacity: 0.6;
}

.actions button {
  margin-left: 5px;
  font-size: 12px;
  padding: 4px 6px;
}

.footer {
  margin-top: 15px;
  font-size: 14px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h2>📋 Minhas Tarefas</h2>

  <div class="top-bar">
    <input type="text" id="taskInput" placeholder="Nova tarefa...">
    <button onclick="addTask()">+</button>
  </div>

  <div class="top-bar">
    <input type="text" id="searchInput" placeholder="Pesquisar..." onkeyup="searchTask()">
    <button onclick="toggleDarkMode()">🌙</button>
  </div>

  <ul id="taskList"></ul>

  <div class="footer">
    <p id="contador"></p>
    <button onclick="clearAll()">Limpar tudo</button>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function renderTasks(list = tasks) {
  const ul = document.getElementById("taskList");
  ul.innerHTML = "";

  list.forEach((task, index) => {
    let li = document.createElement("li");
    li.className = task.done ? "concluida" : "";

    let span = document.createElement("span");
    span.textContent = task.text;
    span.onclick = () => toggleDone(index);

    let actions = document.createElement("div");
    actions.className = "actions";

    let editBtn = document.createElement("button");
    editBtn.textContent = "✏️";
    editBtn.onclick = () => editTask(index);

    let deleteBtn = document.createElement("button");
    deleteBtn.textContent = "🗑";
    deleteBtn.onclick = () => deleteTask(index);

    actions.appendChild(editBtn);
    actions.appendChild(deleteBtn);

    li.appendChild(span);
    li.appendChild(actions);

    ul.appendChild(li);
  });

  updateCounter();
}

function addTask() {
  let input = document.getElementById("taskInput");
  let text = input.value.trim();

  if (!text) return;

  tasks.push({ text: text, done: false });
  input.value = "";

  saveTasks();
  renderTasks();
}

function deleteTask(index) {
  tasks.splice(index, 1);
  saveTasks();
  renderTasks();
}

function toggleDone(index) {
  tasks[index].done = !tasks[index].done;
  saveTasks();
  renderTasks();
}

function editTask(index) {
  let newText = prompt("Editar tarefa:", tasks[index].text);
  if (newText) {
    tasks[index].text = newText;
    saveTasks();
    renderTasks();
  }
}

function clearAll() {
  if (confirm("Tem certeza?")) {
    tasks = [];
    saveTasks();
    renderTasks();
  }
}

function updateCounter() {
  let total = tasks.length;
  let done = tasks.filter(t => t.done).length;
  document.getElementById("contador").textContent =
    `Total: ${total} | Concluídas: ${done}`;
}

function toggleDarkMode() {
  document.body.classList.toggle("dark");
}

function searchTask() {
  let value = document.getElementById("searchInput").value.toLowerCase();
  let filtered = tasks.filter(t => t.text.toLowerCase().includes(value));
  renderTasks(filtered);
}

renderTasks();
</script>

</body>
</html>
