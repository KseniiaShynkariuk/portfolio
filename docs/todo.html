<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Flow Tasks | Organize seu dia com estilo</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f0c1f 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Fundo com partículas animadas */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 20% 40%, rgba(255, 107, 157, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(107, 70, 193, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Container principal com efeito glassmorphism roxo */
    .todo-container {
      max-width: 600px;
      width: 100%;
      background: rgba(20, 15, 45, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 32px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 107, 157, 0.2);
      position: relative;
      z-index: 1;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 107, 157, 0.3);
    }

    /* Header com gradiente neon */
    .todo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 15px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b9d, #c084fc, #a855f7);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      letter-spacing: -0.5px;
    }

    h1 i {
      background: linear-gradient(135deg, #ff6b9d, #c084fc);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-size: 1.8rem;
    }

    .theme-toggle {
      background: rgba(255, 107, 157, 0.2);
      border: 1px solid rgba(255, 107, 157, 0.4);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.3rem;
      transition: all 0.3s;
      color: #ff6b9d;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-toggle:hover {
      background: #ff6b9d;
      color: #0f0c1f;
      transform: rotate(15deg) scale(1.05);
      box-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
    }

    /* Área de adicionar tarefa */
    .add-task-area {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .task-input {
      flex: 1;
      padding: 16px 20px;
      border: 2px solid rgba(255, 107, 157, 0.3);
      border-radius: 60px;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      background: rgba(10, 8, 25, 0.8);
      color: #fff;
      transition: all 0.3s;
    }

    .task-input:focus {
      outline: none;
      border-color: #ff6b9d;
      box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.2);
    }

    .task-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .add-btn {
      background: linear-gradient(135deg, #ff6b9d, #c084fc);
      border: none;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
    }

    .add-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(255, 107, 157, 0.6);
    }

    /* Barra de pesquisa */
    .search-area {
      margin-bottom: 24px;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: rgba(10, 8, 25, 0.6);
      border-radius: 60px;
      padding: 4px 20px;
      border: 1px solid rgba(255, 107, 157, 0.3);
      transition: all 0.3s;
    }

    .search-box:focus-within {
      border-color: #ff6b9d;
      box-shadow: 0 0 0 2px rgba(255, 107, 157, 0.2);
    }

    .search-box i {
      color: #ff6b9d;
      font-size: 1rem;
    }

    .search-input {
      flex: 1;
      padding: 14px 12px;
      border: none;
      background: transparent;
      font-size: 0.9rem;
      font-family: 'Poppins', sans-serif;
      outline: none;
      color: #fff;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    /* Estatísticas */
    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 107, 157, 0.3);
    }

    .stats-info {
      display: flex;
      gap: 20px;
    }

    .stat-badge {
      background: rgba(255, 107, 157, 0.15);
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #ff6b9d;
      border: 1px solid rgba(255, 107, 157, 0.3);
    }

    .clear-btn {
      background: rgba(255, 107, 157, 0.15);
      border: 1px solid rgba(255, 107, 157, 0.4);
      color: #ff6b9d;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .clear-btn:hover {
      background: #ff6b9d;
      color: #0f0c1f;
      border-color: #ff6b9d;
      box-shadow: 0 0 15px rgba(255, 107, 157, 0.4);
    }

    /* Lista de tarefas */
    .task-list {
      list-style: none;
      max-height: 450px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .task-list::-webkit-scrollbar {
      width: 5px;
    }

    .task-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .task-list::-webkit-scrollbar-thumb {
      background: #ff6b9d;
      border-radius: 10px;
    }

    .task-item {
      background: rgba(30, 25, 55, 0.8);
      margin-bottom: 12px;
      padding: 16px 20px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.3s;
      border: 1px solid rgba(255, 107, 157, 0.2);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .task-item:hover {
      transform: translateX(5px);
      border-color: #ff6b9d;
      box-shadow: 0 5px 15px rgba(255, 107, 157, 0.2);
    }

    .task-content {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      cursor: pointer;
    }

    .task-check {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid #ff6b9d;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .task-check.completed {
      background: linear-gradient(135deg, #ff6b9d, #c084fc);
      border-color: transparent;
      color: white;
    }

    .task-check i {
      font-size: 0.75rem;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-check.completed i {
      opacity: 1;
    }

    .task-text {
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.2s;
      word-break: break-word;
      color: #fff;
    }

    .task-text.completed {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .task-actions {
      display: flex;
      gap: 8px;
    }

    .task-btn {
      background: rgba(255, 107, 157, 0.15);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
      color: #ff6b9d;
      font-size: 0.9rem;
    }

    .task-btn:hover {
      background: #ff6b9d;
      color: #0f0c1f;
      transform: scale(1.05);
    }

    .task-btn.delete:hover {
      background: #ff4757;
      color: white;
    }

    /* Mensagem vazia */
    .empty-message {
      text-align: center;
      padding: 50px 20px;
      color: rgba(255, 255, 255, 0.5);
    }

    .empty-message i {
      font-size: 3.5rem;
      margin-bottom: 15px;
      color: #ff6b9d;
      opacity: 0.6;
    }

    .empty-message p {
      font-size: 1rem;
    }

    .empty-message small {
      font-size: 0.8rem;
      opacity: 0.6;
    }

    /* Responsivo */
    @media (max-width: 500px) {
      .todo-container {
        padding: 24px;
      }
      h1 {
        font-size: 1.5rem;
      }
      .task-item {
        padding: 12px 16px;
      }
      .stats-info {
        flex-direction: column;
        gap: 8px;
      }
    }
  </style>
</head>
<body>

<div class="todo-container">
  <div class="todo-header">
    <h1>
      <i class="fas fa-bolt"></i>
      Flow Tasks
    </h1>
    <button class="theme-toggle" onclick="toggleDarkMode()">
      <i class="fas fa-sun"></i>
    </button>
  </div>

  <div class="add-task-area">
    <input type="text" id="taskInput" class="task-input" placeholder="Nova tarefa... ✨" onkeypress="handleKeyPress(event)">
    <button class="add-btn" onclick="addTask()">
      <i class="fas fa-plus"></i>
    </button>
  </div>

  <div class="search-area">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Pesquisar tarefas..." onkeyup="searchTask()">
    </div>
  </div>

  <div class="stats">
    <div class="stats-info">
      <span class="stat-badge" id="totalCount">Total: 0</span>
      <span class="stat-badge" id="completedCount">Concluídas: 0</span>
    </div>
    <button class="clear-btn" onclick="clearAll()">
      <i class="fas fa-trash-alt"></i> Limpar tudo
    </button>
  </div>

  <ul class="task-list" id="taskList"></ul>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks_neon")) || [];

  function saveTasks() {
    localStorage.setItem("tasks_neon", JSON.stringify(tasks));
  }

  function renderTasks(filteredTasks = null) {
    const list = document.getElementById("taskList");
    const searchTerm = document.getElementById("searchInput")?.value.toLowerCase() || "";
    let tasksToRender = filteredTasks !== null ? filteredTasks : tasks;
    
    if (searchTerm && filteredTasks === null) {
      tasksToRender = tasks.filter(t => t.text.toLowerCase().includes(searchTerm));
    }
    
    list.innerHTML = "";
    
    if (tasksToRender.length === 0) {
      list.innerHTML = `
        <div class="empty-message">
          <i class="fas fa-star-of-life"></i>
          <p>✨ Nenhuma tarefa por aqui</p>
          <small>Adicione sua primeira tarefa acima</small>
        </div>
      `;
    } else {
      tasksToRender.forEach((task, idx) => {
        const originalIndex = tasks.findIndex(t => t === task);
        const li = document.createElement("li");
        li.className = "task-item";
        
        li.innerHTML = `
          <div class="task-content" onclick="toggleDone(${originalIndex})">
            <div class="task-check ${task.done ? 'completed' : ''}">
              <i class="fas fa-check"></i>
            </div>
            <span class="task-text ${task.done ? 'completed' : ''}">${escapeHtml(task.text)}</span>
          </div>
          <div class="task-actions">
            <button class="task-btn edit" onclick="editTask(${originalIndex}); event.stopPropagation();">
              <i class="fas fa-pencil-alt"></i>
            </button>
            <button class="task-btn delete" onclick="deleteTask(${originalIndex}); event.stopPropagation();">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        `;
        
        list.appendChild(li);
      });
    }
    
    updateStats();
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function addTask() {
    const input = document.getElementById("taskInput");
    const text = input.value.trim();
    
    if (!text) {
      alert("✨ Por favor, digite uma tarefa!");
      return;
    }
    
    tasks.unshift({ text: text, done: false });
    input.value = "";
    saveTasks();
    renderTasks();
  }

  function deleteTask(index) {
    if (confirm("🗑 Remover esta tarefa?")) {
      tasks.splice(index, 1);
      saveTasks();
      renderTasks();
    }
  }

  function toggleDone(index) {
    tasks[index].done = !tasks[index].done;
    saveTasks();
    renderTasks();
  }

  function editTask(index) {
    const newText = prompt("✏️ Editar tarefa:", tasks[index].text);
    if (newText && newText.trim()) {
      tasks[index].text = newText.trim();
      saveTasks();
      renderTasks();
    }
  }

  function clearAll() {
    if (confirm("⚠️ Tem certeza? Todas as tarefas serão apagadas permanentemente.")) {
      tasks = [];
      saveTasks();
      renderTasks();
    }
  }

  function updateStats() {
    const total = tasks.length;
    const completed = tasks.filter(t => t.done).length;
    document.getElementById("totalCount").innerHTML = `Total: ${total}`;
    document.getElementById("completedCount").innerHTML = `Concluídas: ${completed}`;
  }

  function searchTask() {
    const term = document.getElementById("searchInput").value.toLowerCase();
    if (term === "") {
      renderTasks();
    } else {
      const filtered = tasks.filter(t => t.text.toLowerCase().includes(term));
      renderTasks(filtered);
    }
  }

  function handleKeyPress(event) {
    if (event.key === "Enter") {
      addTask();
    }
  }

  function toggleDarkMode() {
    const body = document.body;
    const icon = document.querySelector(".theme-toggle i");
    
    if (body.style.background !== "linear-gradient(135deg, #f5f0ff 0%, #e9e4ff 100%)") {
      body.style.background = "linear-gradient(135deg, #f5f0ff 0%, #e9e4ff 100%)";
      body.style.backgroundAttachment = "fixed";
      icon.className = "fas fa-moon";
      
      document.querySelector(".todo-container").style.background = "rgba(255, 255, 255, 0.95)";
      document.querySelector(".todo-container").style.border = "1px solid rgba(156, 84, 218, 0.3)";
      
      const allTexts = document.querySelectorAll(".task-text, h1, .stat-badge, .clear-btn, .task-input, .search-input, .empty-message p, .empty-message small");
      allTexts.forEach(el => {
        if (el.classList.contains("task-text")) el.style.color = "#1a1a2e";
        else if (el.tagName === "H1") el.style.background = "linear-gradient(135deg, #9c54da, #ff6b9d)";
        else if (el.classList.contains("stat-badge")) el.style.color = "#9c54da";
        else if (el.classList.contains("clear-btn")) el.style.color = "#9c54da";
        else if (el.classList.contains("task-input")) el.style.color = "#1a1a2e";
        else if (el.classList.contains("search-input")) el.style.color = "#1a1a2e";
      });
      
      localStorage.setItem("todoTheme", "light");
    } else {
      body.style.background = "";
      icon.className = "fas fa-sun";
      document.querySelector(".todo-container").style.background = "rgba(20, 15, 45, 0.85)";
      document.querySelector(".todo-container").style.border = "1px solid rgba(255, 107, 157, 0.3)";
      
      location.reload();
    }
  }

  renderTasks();
</script>

</body>
</html>
