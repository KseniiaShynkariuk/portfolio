<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Flow Tasks | Organize suas tarefas</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f2ef;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    /* Container principal - elegante e clean */
    .todo-container {
      max-width: 580px;
      width: 100%;
      background: #ffffff;
      border-radius: 32px;
      padding: 36px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
    }

    /* Header */
    .todo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 15px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #2c3e3a;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.3px;
    }

    h1 i {
      color: #8ba89e;
      font-size: 1.6rem;
    }

    .theme-toggle {
      background: #f5f3f0;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.3s;
      color: #6b8b7a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-toggle:hover {
      background: #e8e4df;
      transform: scale(1.02);
    }

    /* Área de adicionar tarefa */
    .add-task-area {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .task-input {
      flex: 1;
      padding: 14px 18px;
      border: 1px solid #e2ddd8;
      border-radius: 24px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #2c3e3a;
      transition: all 0.3s;
    }

    .task-input:focus {
      outline: none;
      border-color: #b2c5ba;
      box-shadow: 0 0 0 3px rgba(107, 139, 122, 0.1);
    }

    .task-input::placeholder {
      color: #b9b0a8;
    }

    .add-btn {
      background: #ffffff;
      border: 1px solid #e2ddd8;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      color: #8ba89e;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .add-btn:hover {
      background: #f9f7f5;
      border-color: #b2c5ba;
      color: #6b8b7a;
    }

    /* Barra de pesquisa */
    .search-area {
      margin-bottom: 24px;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: #f9f7f5;
      border-radius: 60px;
      padding: 4px 18px;
      border: 1px solid #e2ddd8;
      transition: all 0.3s;
    }

    .search-box:focus-within {
      border-color: #b2c5ba;
      background: #ffffff;
    }

    .search-box i {
      color: #b9b0a8;
      font-size: 0.9rem;
    }

    .search-input {
      flex: 1;
      padding: 12px 12px;
      border: none;
      background: transparent;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      color: #2c3e3a;
    }

    .search-input::placeholder {
      color: #cbc3bb;
    }

    /* Estatísticas */
    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 12px 0 8px;
      border-bottom: 1px solid #efebe7;
    }

    .stats-info {
      display: flex;
      gap: 20px;
    }

    .stat-badge {
      font-size: 0.8rem;
      font-weight: 500;
      color: #8ba89e;
    }

    .clear-btn {
      background: transparent;
      border: none;
      color: #b9b0a8;
      padding: 6px 0;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }

    .clear-btn:hover {
      color: #b2826b;
    }

    /* Lista de tarefas */
    .task-list {
      list-style: none;
      max-height: 450px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .task-list::-webkit-scrollbar {
      width: 4px;
    }

    .task-list::-webkit-scrollbar-track {
      background: #efebe7;
      border-radius: 10px;
    }

    .task-list::-webkit-scrollbar-thumb {
      background: #d4cdc5;
      border-radius: 10px;
    }

    .task-item {
      background: #ffffff;
      margin-bottom: 8px;
      padding: 14px 16px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s;
      border: 1px solid #efebe7;
    }

    .task-item:hover {
      border-color: #e2ddd8;
      background: #fefdfc;
    }

    .task-content {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      cursor: pointer;
    }

    .task-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid #d4cdc5;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .task-check.completed {
      background: #8ba89e;
      border-color: #8ba89e;
    }

    .task-check i {
      font-size: 0.65rem;
      color: white;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-check.completed i {
      opacity: 1;
    }

    .task-text {
      font-size: 0.95rem;
      font-weight: 500;
      color: #4a5b55;
      transition: all 0.2s;
      word-break: break-word;
    }

    .task-text.completed {
      text-decoration: line-through;
      color: #cbc3bb;
    }

    .task-actions {
      display: flex;
      gap: 8px;
    }

    .task-btn {
      background: transparent;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
      color: #cbc3bb;
      font-size: 0.85rem;
    }

    .task-btn:hover {
      background: #f5f3f0;
      color: #8ba89e;
    }

    .task-btn.delete:hover {
      color: #e0a38b;
    }

    /* Mensagem vazia */
    .empty-message {
      text-align: center;
      padding: 50px 20px;
      color: #cbc3bb;
    }

    .empty-message i {
      font-size: 3rem;
      margin-bottom: 15px;
      color: #e2ddd8;
    }

    .empty-message p {
      font-size: 0.9rem;
      margin-top: 8px;
    }

    /* Responsivo */
    @media (max-width: 500px) {
      .todo-container {
        padding: 24px;
      }
      h1 {
        font-size: 1.5rem;
      }
      .task-item {
        padding: 12px 14px;
      }
      .stats-info {
        gap: 12px;
      }
    }
  </style>
</head>
<body>

<div class="todo-container">
  <div class="todo-header">
    <h1>
      <i class="far fa-circle-check"></i>
      Flow Tasks
    </h1>
    <button class="theme-toggle" onclick="toggleDarkMode()">
      <i class="fas fa-moon"></i>
    </button>
  </div>

  <div class="add-task-area">
    <input type="text" id="taskInput" class="task-input" placeholder="Adicionar nova tarefa..." onkeypress="handleKeyPress(event)">
    <button class="add-btn" onclick="addTask()">
      <i class="fas fa-plus"></i>
    </button>
  </div>

  <div class="search-area">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Buscar tarefa..." onkeyup="searchTask()">
    </div>
  </div>

  <div class="stats">
    <div class="stats-info">
      <span class="stat-badge" id="totalCount">Total: 0</span>
      <span class="stat-badge" id="completedCount">Concluídas: 0</span>
    </div>
    <button class="clear-btn" onclick="clearAll()">
      <i class="fas fa-trash-alt"></i> Limpar tudo
    </button>
  </div>

  <ul class="task-list" id="taskList"></ul>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks_elegant")) || [];

  function saveTasks() {
    localStorage.setItem("tasks_elegant", JSON.stringify(tasks));
  }

  function renderTasks(filteredTasks = null) {
    const list = document.getElementById("taskList");
    const searchTerm = document.getElementById("searchInput")?.value.toLowerCase() || "";
    let tasksToRender = filteredTasks !== null ? filteredTasks : tasks;
    
    if (searchTerm && filteredTasks === null) {
      tasksToRender = tasks.filter(t => t.text.toLowerCase().includes(searchTerm));
    }
    
    list.innerHTML = "";
    
    if (tasksToRender.length === 0) {
      list.innerHTML = `
        <div class="empty-message">
          <i class="far fa-clipboard"></i>
          <p>Nenhuma tarefa por aqui</p>
          <small style="font-size:0.75rem">Adicione sua primeira tarefa acima</small>
        </div>
      `;
    } else {
      tasksToRender.forEach((task, idx) => {
        const originalIndex = tasks.findIndex(t => t === task);
        const li = document.createElement("li");
        li.className = "task-item";
        
        li.innerHTML = `
          <div class="task-content" onclick="toggleDone(${originalIndex})">
            <div class="task-check ${task.done ? 'completed' : ''}">
              <i class="fas fa-check"></i>
            </div>
            <span class="task-text ${task.done ? 'completed' : ''}">${escapeHtml(task.text)}</span>
          </div>
          <div class="task-actions">
            <button class="task-btn edit" onclick="editTask(${originalIndex}); event.stopPropagation();">
              <i class="fas fa-pencil-alt"></i>
            </button>
            <button class="task-btn delete" onclick="deleteTask(${originalIndex}); event.stopPropagation();">
              <i class="fas fa-trash-alt"></i>
            </button>
          </div>
        `;
        
        list.appendChild(li);
      });
    }
    
    updateStats();
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function addTask() {
    const input = document.getElementById("taskInput");
    const text = input.value.trim();
    
    if (!text) {
      alert("Por favor, digite uma tarefa.");
      return;
    }
    
    tasks.unshift({ text: text, done: false });
    input.value = "";
    saveTasks();
    renderTasks();
  }

  function deleteTask(index) {
    if (confirm("Remover esta tarefa?")) {
      tasks.splice(index, 1);
      saveTasks();
      renderTasks();
    }
  }

  function toggleDone(index) {
    tasks[index].done = !tasks[index].done;
    saveTasks();
    renderTasks();
  }

  function editTask(index) {
    const newText = prompt("Editar tarefa:", tasks[index].text);
    if (newText && newText.trim()) {
      tasks[index].text = newText.trim();
      saveTasks();
      renderTasks();
    }
  }

  function clearAll() {
    if (confirm("Tem certeza? Todas as tarefas serão apagadas.")) {
      tasks = [];
      saveTasks();
      renderTasks();
    }
  }

  function updateStats() {
    const total = tasks.length;
    const completed = tasks.filter(t => t.done).length;
    document.getElementById("totalCount").innerHTML = `Total: ${total}`;
    document.getElementById("completedCount").innerHTML = `Concluídas: ${completed}`;
  }

  function searchTask() {
    const term = document.getElementById("searchInput").value.toLowerCase();
    if (term === "") {
      renderTasks();
    } else {
      const filtered = tasks.filter(t => t.text.toLowerCase().includes(term));
      renderTasks(filtered);
    }
  }

  function handleKeyPress(event) {
    if (event.key === "Enter") {
      addTask();
    }
  }

  function toggleDarkMode() {
    const body = document.body;
    const container = document.querySelector(".todo-container");
    const icon = document.querySelector(".theme-toggle i");
    
    if (body.style.background !== "#1a2c2e") {
      body.style.background = "#1a2c2e";
      container.style.background = "#2a3a38";
      container.style.boxShadow = "0 20px 35px -12px rgba(0, 0, 0, 0.3)";
      icon.className = "fas fa-sun";
      
      document.querySelectorAll(".task-input, .search-box, .task-item, .add-btn").forEach(el => {
        if (el.classList.contains("task-input")) {
          el.style.background = "#2a3a38";
          el.style.borderColor = "#3e5a54";
          el.style.color = "#e8dfd8";
        } else if (el.classList.contains("search-box")) {
          el.style.background = "#2a3a38";
          el.style.borderColor = "#3e5a54";
        } else if (el.classList.contains("task-item")) {
          el.style.background = "#2a3a38";
          el.style.borderColor = "#3e5a54";
        } else if (el.classList.contains("add-btn")) {
          el.style.background = "#2a3a38";
          el.style.borderColor = "#3e5a54";
          el.style.color = "#8ba89e";
        }
      });
      
      document.querySelectorAll(".task-text").forEach(el => el.style.color = "#e8dfd8");
      document.querySelectorAll(".stat-badge").forEach(el => el.style.color = "#8ba89e");
      document.querySelector(".stats").style.borderBottomColor = "#3e5a54";
      
      localStorage.setItem("todoTheme", "dark");
    } else {
      body.style.background = "";
      location.reload();
    }
  }
  
  if (localStorage.getItem("todoTheme") === "dark") {
    toggleDarkMode();
  }

  renderTasks();
</script>

</body>
</html>
