<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Flow Tasks | Organize suas tarefas</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdef5 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      transition: background 0.4s ease;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 30%, rgba(100, 150, 200, 0.1) 0%, transparent 60%),
                  radial-gradient(circle at 80% 70%, rgba(70, 130, 200, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    body.dark {
      background: linear-gradient(135deg, #0f1217 0%, #14181f 100%);
    }

    body.dark::before {
      background: radial-gradient(circle at 20% 30%, rgba(168, 195, 184, 0.05) 0%, transparent 60%),
                  radial-gradient(circle at 80% 70%, rgba(207, 165, 141, 0.03) 0%, transparent 60%);
    }

    /* Container principal - responsivo */
    .todo-container {
      max-width: 600px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.8);
      transition: all 0.4s ease;
      border: 1px solid rgba(255, 255, 255, 0.6);
      position: relative;
      z-index: 1;
    }

    body.dark .todo-container {
      background: rgba(25, 35, 35, 0.9);
      backdrop-filter: blur(12px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* Header */
    .todo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #2c6e9e, #5a9bc2);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      letter-spacing: -0.5px;
    }

    body.dark h1 {
      background: linear-gradient(135deg, #b8cfc4, #d6bba8);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    h1 i {
      background: linear-gradient(135deg, #2c6e9e, #5a9bc2);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-size: 1.4rem;
    }

    .theme-toggle {
      background: rgba(44, 110, 158, 0.12);
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s ease;
      color: #2c6e9e;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      flex-shrink: 0;
    }

    body.dark .theme-toggle {
      background: rgba(168, 195, 184, 0.12);
      color: #b8cfc4;
    }

    .theme-toggle:hover {
      background: #2c6e9e;
      color: white;
      transform: rotate(15deg) scale(1.05);
    }

    /* Área de adicionar tarefa */
    .add-task-area {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .task-input {
      flex: 1;
      padding: 14px 18px;
      border: none;
      border-radius: 50px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      background: rgba(255, 255, 255, 0.95);
      color: #1a4a6e;
      transition: all 0.3s;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(44, 110, 158, 0.2);
    }

    body.dark .task-input {
      background: rgba(30, 45, 45, 0.9);
      color: #e8dfd8;
      border-color: rgba(168, 195, 184, 0.15);
    }

    .task-input:focus {
      outline: none;
      border-color: #2c6e9e;
      box-shadow: 0 0 0 3px rgba(44, 110, 158, 0.15);
    }

    .task-input::placeholder {
      color: #8ab3cf;
    }

    .add-btn {
      background: linear-gradient(135deg, #2c6e9e, #5a9bc2);
      border: none;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(44, 110, 158, 0.3);
      flex-shrink: 0;
    }

    .add-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(44, 110, 158, 0.4);
    }

    /* Barra de pesquisa */
    .search-area {
      margin-bottom: 20px;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50px;
      padding: 4px 18px;
      border: 1px solid rgba(44, 110, 158, 0.2);
      transition: all 0.3s;
    }

    body.dark .search-box {
      background: rgba(30, 45, 45, 0.7);
      border-color: rgba(168, 195, 184, 0.15);
    }

    .search-box:focus-within {
      border-color: #2c6e9e;
      background: white;
    }

    .search-box i {
      color: #2c6e9e;
      font-size: 0.9rem;
    }

    .search-input {
      flex: 1;
      padding: 12px 12px;
      border: none;
      background: transparent;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      color: #1a4a6e;
    }

    body.dark .search-input {
      color: #e8dfd8;
    }

    /* Estatísticas */
    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 12px 0;
      border-top: 1px solid rgba(44, 110, 158, 0.2);
      border-bottom: 1px solid rgba(44, 110, 158, 0.2);
      flex-wrap: wrap;
      gap: 12px;
    }

    body.dark .stats {
      border-top-color: rgba(168, 195, 184, 0.2);
      border-bottom-color: rgba(168, 195, 184, 0.2);
    }

    .stats-info {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stat-badge {
      font-size: 0.8rem;
      font-weight: 600;
      padding: 5px 12px;
      background: rgba(44, 110, 158, 0.1);
      border-radius: 40px;
      color: #2c6e9e;
      letter-spacing: -0.2px;
    }

    body.dark .stat-badge {
      background: rgba(184, 207, 196, 0.1);
      color: #b8cfc4;
    }

    .clear-btn {
      background: transparent;
      border: none;
      color: #8ab3cf;
      padding: 6px 14px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 40px;
      white-space: nowrap;
    }

    .clear-btn:hover {
      background: rgba(44, 110, 158, 0.1);
      color: #2c6e9e;
    }

    /* Lista de tarefas */
    .task-list {
      list-style: none;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .task-list::-webkit-scrollbar {
      width: 4px;
    }

    .task-list::-webkit-scrollbar-track {
      background: rgba(44, 110, 158, 0.1);
      border-radius: 10px;
    }

    .task-list::-webkit-scrollbar-thumb {
      background: #2c6e9e;
      border-radius: 10px;
    }

    .task-item {
      background: rgba(255, 255, 255, 0.85);
      margin-bottom: 10px;
      padding: 14px 16px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border: 1px solid rgba(44, 110, 158, 0.15);
      backdrop-filter: blur(4px);
      animation: slideIn 0.3s ease;
      gap: 10px;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    body.dark .task-item {
      background: rgba(30, 45, 45, 0.7);
      border-color: rgba(168, 195, 184, 0.1);
    }

    .task-item:hover {
      transform: translateX(3px);
      border-color: #2c6e9e;
      background: rgba(255, 255, 255, 0.95);
    }

    .task-content {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      cursor: pointer;
      min-width: 0;
    }

    .task-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #2c6e9e;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    body.dark .task-check {
      border-color: #b8cfc4;
    }

    .task-check.completed {
      background: linear-gradient(135deg, #2c6e9e, #5a9bc2);
      border-color: transparent;
    }

    .task-check i {
      font-size: 0.65rem;
      color: white;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-check.completed i {
      opacity: 1;
    }

    .task-text {
      font-size: 0.9rem;
      font-weight: 500;
      color: #1a4a6e;
      transition: all 0.2s;
      word-break: break-word;
      flex: 1;
    }

    body.dark .task-text {
      color: #e0d4cc;
    }

    .task-text.completed {
      text-decoration: line-through;
      color: #8ab3cf;
    }

    .task-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .task-btn {
      background: rgba(44, 110, 158, 0.08);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
      color: #2c6e9e;
      font-size: 0.85rem;
    }

    body.dark .task-btn {
      background: rgba(184, 207, 196, 0.08);
      color: #b8cfc4;
    }

    .task-btn:hover {
      background: #2c6e9e;
      color: white;
      transform: scale(1.05);
    }

    .task-btn.delete:hover {
      background: #d6a38b;
    }

    /* Mensagem vazia */
    .empty-message {
      text-align: center;
      padding: 50px 20px;
    }

    .empty-message i {
      font-size: 3rem;
      margin-bottom: 15px;
      color: #8ab3cf;
      opacity: 0.6;
    }

    .empty-message p {
      font-size: 0.9rem;
      font-weight: 500;
      color: #2c6e9e;
      margin-top: 8px;
    }

    /* Responsivo para telemóvel */
    @media (max-width: 550px) {
      body {
        padding: 12px;
      }
      
      .todo-container {
        padding: 18px;
        border-radius: 28px;
      }
      
      h1 {
        font-size: 1.3rem;
      }
      
      h1 i {
        font-size: 1.2rem;
      }
      
      .theme-toggle {
        width: 40px;
        height: 40px;
        font-size: 1rem;
      }
      
      .task-input {
        padding: 12px 16px;
        font-size: 0.9rem;
      }
      
      .add-btn {
        width: 48px;
        height: 48px;
        font-size: 1.1rem;
      }
      
      .task-item {
        padding: 12px 12px;
      }
      
      .task-text {
        font-size: 0.85rem;
      }
      
      .task-btn {
        width: 30px;
        height: 30px;
        font-size: 0.8rem;
      }
      
      .task-check {
        width: 20px;
        height: 20px;
      }
      
      .stat-badge {
        font-size: 0.7rem;
        padding: 4px 10px;
      }
      
      .clear-btn {
        font-size: 0.7rem;
        padding: 5px 12px;
      }
      
      .stats {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }
      
      .stats-info {
        justify-content: center;
      }
      
      .clear-btn {
        text-align: center;
      }
      
      .empty-message {
        padding: 40px 15px;
      }
      
      .empty-message i {
        font-size: 2.5rem;
      }
    }

    @media (max-width: 400px) {
      .task-content {
        gap: 8px;
      }
      
      .task-text {
        font-size: 0.8rem;
      }
      
      .task-actions {
        gap: 4px;
      }
      
      .task-btn {
        width: 28px;
        height: 28px;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>

<div class="todo-container">
  <div class="todo-header">
    <h1>
      <i class="fas fa-tasks"></i>
      Flow Tasks
    </h1>
    <button class="theme-toggle" id="themeToggle">
      <i class="fas fa-moon"></i>
    </button>
  </div>

  <div class="add-task-area">
    <input type="text" id="taskInput" class="task-input" placeholder="✨ Nova tarefa..." onkeypress="handleKeyPress(event)">
    <button class="add-btn" onclick="addTask()">
      <i class="fas fa-plus"></i>
    </button>
  </div>

  <div class="search-area">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Buscar tarefa..." onkeyup="searchTask()">
    </div>
  </div>

  <div class="stats">
    <div class="stats-info">
      <span class="stat-badge" id="totalCount">
        <i class="far fa-list-alt"></i> Total: 0
      </span>
      <span class="stat-badge" id="completedCount">
        <i class="far fa-check-circle"></i> Concluídas: 0
      </span>
    </div>
    <button class="clear-btn" onclick="clearAll()">
      <i class="fas fa-trash-alt"></i> Limpar tudo
    </button>
  </div>

  <ul class="task-list" id="taskList"></ul>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks_flow")) || [];

  function saveTasks() {
    localStorage.setItem("tasks_flow", JSON.stringify(tasks));
    const container = document.querySelector('.todo-container');
    container.classList.add('saving');
    setTimeout(() => container.classList.remove('saving'), 300);
  }

  function renderTasks(filteredTasks = null) {
    const list = document.getElementById("taskList");
    const searchTerm = document.getElementById("searchInput")?.value.toLowerCase() || "";
    let tasksToRender = filteredTasks !== null ? filteredTasks : tasks;
    
    if (searchTerm && filteredTasks === null) {
      tasksToRender = tasks.filter(t => t.text.toLowerCase().includes(searchTerm));
    }
    
    list.innerHTML = "";
    
    if (tasksToRender.length === 0) {
      list.innerHTML = `
        <div class="empty-message">
          <i class="fas fa-clipboard-list"></i>
          <p>Nenhuma tarefa por aqui</p>
          <small style="font-size:0.7rem; color:#8ab3cf;">Adicione sua primeira tarefa acima</small>
        </div>
      `;
    } else {
      tasksToRender.forEach((task, idx) => {
        const originalIndex = tasks.findIndex(t => t === task);
        const li = document.createElement("li");
        li.className = "task-item";
        
        li.innerHTML = `
          <div class="task-content" onclick="toggleDone(${originalIndex})">
            <div class="task-check ${task.done ? 'completed' : ''}">
              <i class="fas fa-check"></i>
            </div>
            <span class="task-text ${task.done ? 'completed' : ''}">${escapeHtml(task.text)}</span>
          </div>
          <div class="task-actions">
            <button class="task-btn edit" onclick="editTask(${originalIndex}); event.stopPropagation();">
              <i class="fas fa-pencil-alt"></i>
            </button>
            <button class="task-btn delete" onclick="deleteTask(${originalIndex}); event.stopPropagation();">
              <i class="fas fa-trash-alt"></i>
            </button>
          </div>
        `;
        
        list.appendChild(li);
      });
    }
    
    updateStats();
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function addTask() {
    const input = document.getElementById("taskInput");
    const text = input.value.trim();
    
    if (!text) {
      alert("✨ Por favor, digite uma tarefa.");
      return;
    }
    
    tasks.unshift({ text: text, done: false });
    input.value = "";
    saveTasks();
    renderTasks();
  }

  function deleteTask(index) {
    if (confirm("🗑 Remover esta tarefa?")) {
      tasks.splice(index, 1);
      saveTasks();
      renderTasks();
    }
  }

  function toggleDone(index) {
    tasks[index].done = !tasks[index].done;
    saveTasks();
    renderTasks();
  }

  function editTask(index) {
    const newText = prompt("✏️ Editar tarefa:", tasks[index].text);
    if (newText && newText.trim()) {
      tasks[index].text = newText.trim();
      saveTasks();
      renderTasks();
    }
  }

  function clearAll() {
    if (confirm("⚠️ Tem certeza? Todas as tarefas serão apagadas permanentemente.")) {
      tasks = [];
      saveTasks();
      renderTasks();
    }
  }

  function updateStats() {
    const total = tasks.length;
    const completed = tasks.filter(t => t.done).length;
    document.getElementById("totalCount").innerHTML = `<i class="far fa-list-alt"></i> Total: ${total}`;
    document.getElementById("completedCount").innerHTML = `<i class="far fa-check-circle"></i> Concluídas: ${completed}`;
  }

  function searchTask() {
    const term = document.getElementById("searchInput").value.toLowerCase();
    if (term === "") {
      renderTasks();
    } else {
      const filtered = tasks.filter(t => t.text.toLowerCase().includes(term));
      renderTasks(filtered);
    }
  }

  function handleKeyPress(event) {
    if (event.key === "Enter") {
      addTask();
    }
  }

  function initTheme() {
    const savedTheme = localStorage.getItem("todoTheme");
    if (savedTheme === "dark") {
      document.body.classList.add("dark");
      const icon = document.querySelector("#themeToggle i");
      if (icon) icon.className = "fas fa-sun";
    }
  }

  function toggleDarkMode() {
    const body = document.body;
    const icon = document.querySelector("#themeToggle i");
    
    if (body.classList.contains("dark")) {
      body.classList.remove("dark");
      icon.className = "fas fa-moon";
      localStorage.setItem("todoTheme", "light");
    } else {
      body.classList.add("dark");
      icon.className = "fas fa-sun";
      localStorage.setItem("todoTheme", "dark");
    }
  }

  const themeBtn = document.getElementById("themeToggle");
  if (themeBtn) {
    themeBtn.addEventListener("click", toggleDarkMode);
  }

  initTheme();
  renderTasks();
</script>

</body>
</html>
